name: Weekly Update Check

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-check:
    name: Apply Lint Fixes and Open Issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix Markdown issues
        run: npm run lint:markdown:fix || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes to branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B automated/weekly-lint-fixes
          git add -A
          git commit -m "chore: auto-fix markdown lint issues"
          git push origin automated/weekly-lint-fixes --force

      - name: Create issue for lint fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: ./.github/workflows/scripts/create-weekly-update-issue.sh
