name: Monitor Technology Best Practice Changes

on:
  schedule:
    - cron: "0 9 * * 0" # Every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-tech-changes:
    name: Check Technology Version Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for npm outdated
        id: outdated
        run: |
          outdated_json=$(npm outdated --json || true)
          [ -z "$outdated_json" ] && outdated_json='{}'
          echo "outdated=$(echo "$outdated_json" | jq -c .)" >> "$GITHUB_OUTPUT"

      - name: Check Node.js LTS status
        id: node-status
        run: |
          current=$(node --version | cut -dv -f2 | cut -d. -f1)
          echo "current_node=${current}" >> "$GITHUB_OUTPUT"

      - name: Create issue for technology updates
        if: steps.outdated.outputs.outdated != '{}'
        env:
          OUTDATED_JSON: ${{ steps.outdated.outputs.outdated }}
        run: |
          ./.github/workflows/scripts/create-tech-update-issue.sh "$OUTDATED_JSON"
